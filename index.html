<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>單字特訓 · 自訂測驗平台</title>
  <script>
    tailwind = {
      config: {
        theme: {
          extend: {
            fontFamily: { sans: ['Google Sans', 'Inter', 'Noto Sans TC', 'sans-serif'] },
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Product+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { background-color: #f3f4f6; }
    ::-webkit-scrollbar { width: 0; background: transparent; }
    .option-btn { transition: all 0.15s ease; user-select: none; }
    .option-btn:active { transform: scale(0.97); }
    .option-btn:disabled { cursor: default; }
    
    /* modal & dialog */
    .modal-overlay {
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }
    .modal-overlay.closed {
      opacity: 0;
      visibility: hidden;
    }
    .modal-card {
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .modal-overlay.closed .modal-card {
      transform: scale(0.95);
      opacity: 0;
    }
    .toast {
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .toast.hide {
      opacity: 0;
      transform: translateY(1rem);
      pointer-events: none;
    }
  </style>
</head>
<body class="min-h-screen pb-20">
<header class="sticky top-0 z-40 bg-white/85 backdrop-blur-md shadow-sm border-b border-gray-100">
  <div class="max-w-3xl mx-auto px-4 py-3">
    <div class="flex items-center justify-between gap-3 mb-2">
      <div class="flex items-center gap-2">
        <button id="back-to-list-btn" class="hidden p-1 -ml-1 text-gray-500 hover:text-gray-700 transition-colors" title="返回列表">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="text-xl font-extrabold text-gray-900 tracking-tight">單字特訓</h1>
      </div>
      <div id="score-display" class="hidden flex-shrink-0 bg-gray-100 text-gray-700 px-3 py-1 rounded-full text-sm font-semibold">
        得分 <span id="score" class="text-gray-900">0</span><span class="text-gray-400">/</span><span id="total-count" class="text-gray-900">0</span>
      </div>
    </div>
    <div class="flex flex-wrap items-center justify-between gap-2">
      <div class="flex items-center gap-2">
        <button id="delete-set-btn" class="hidden p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors" title="刪除題集">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M5.333 4V2.667a1.333 1.333 0 011.334-1.334h2.666a1.333 1.333 0 011.334 1.334V4m2 0v9.333a1.333 1.333 0 01-1.334 1.334H4.667a1.333 1.333 0 01-1.334-1.334V4h9.334z"/></svg>
        </button>
      </div>
      <button id="import-btn" class="flex-shrink-0 text-sm bg-gray-900 hover:bg-gray-800 text-white px-3 py-2 rounded-xl transition-colors font-medium">+ 匯入題目</button>
    </div>
  </div>
</header>

<main class="max-w-3xl mx-auto mt-4 px-4">
  <!-- 首頁：題集列表 -->
  <div id="list-view">
    <div id="empty-state" class="text-center py-16">
      <div class="w-16 h-16 mx-auto mb-5 rounded-2xl bg-gray-100 flex items-center justify-center">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <h2 class="text-lg font-bold text-gray-800 mb-2">尚無題目</h2>
      <p class="text-gray-500 text-sm mb-6">匯入 AI 產生的 JSON 即可開始測驗</p>
      <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
        <button id="empty-import-btn" class="w-full sm:w-auto px-6 py-2.5 bg-gray-900 hover:bg-gray-800 text-white rounded-xl text-sm font-semibold">匯入題目</button>
        <!-- 複製AI指令已移至匯入卡片內 -->
      </div>
      <p class="text-gray-400 text-xs mt-4">第一次使用？點擊「複製AI指令」貼給其他AI助手，<br>將產生的 JSON 貼回「匯入題目」即可開始</p>
    </div>

    <section id="sets-overview" class="hidden mb-4">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 sm:p-5">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
          <div>
            <p class="text-xs font-semibold text-gray-400 mb-1">題庫總覽</p>
            <h2 class="text-lg font-bold text-gray-900">從你的題集直接開始練習</h2>
            <p class="text-sm text-gray-500 mt-1">保留現在的內容風格，只把常用操作放得更順手。</p>
          </div>
          <div class="grid grid-cols-2 gap-2 sm:min-w-[220px]">
            <div class="rounded-xl bg-gray-50 border border-gray-100 px-3 py-2">
              <p class="text-xs text-gray-400">題集</p>
              <p id="sets-count" class="text-lg font-bold text-gray-900">0</p>
            </div>
            <div class="rounded-xl bg-gray-50 border border-gray-100 px-3 py-2">
              <p class="text-xs text-gray-400">總題數</p>
              <p id="questions-count" class="text-lg font-bold text-gray-900">0</p>
            </div>
          </div>
        </div>
      </div>
    </section>
    
    <div id="sets-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    </div>
  </div>
  
  <!-- 測驗視圖 -->
  <div id="quiz-view" class="hidden">
    <section id="quiz-progress-panel" class="mb-4">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
        <div class="flex items-start justify-between gap-3 mb-3">
          <div>
            <p id="active-set-name" class="text-sm font-semibold text-gray-900">題集名稱</p>
            <p id="progress-meta" class="text-xs text-gray-500 mt-1">已作答 0 / 0</p>
          </div>
          <div class="text-right">
            <p class="text-xs text-gray-400">完成度</p>
            <p id="progress-percent" class="text-lg font-bold text-gray-900">0%</p>
          </div>
        </div>
        <div class="h-2 rounded-full bg-gray-100 overflow-hidden">
          <div id="progress-bar" class="h-full w-0 bg-gray-900 rounded-full transition-all duration-300"></div>
        </div>
      </div>
    </section>
    <div id="quiz-container" class="space-y-4"></div>
    <section id="completion-banner" class="hidden mt-6">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 text-center">
        <h2 class="text-xl font-extrabold text-gray-900 mb-1">測驗完成</h2>
        <p class="text-gray-500 mb-5">得分 <span id="final-score" class="text-gray-900 font-bold">0</span> / <span id="final-total" class="text-gray-900 font-bold">0</span></p>
        <div id="wrong-export-area" class="hidden">
          <button id="copy-wrong-btn" class="px-5 py-2.5 bg-gray-900 hover:bg-gray-800 text-white rounded-xl text-sm font-medium">複製錯題給 AI 解析</button>
        </div>
        <p id="perfect-score-msg" class="hidden text-green-600 font-semibold text-sm">全對，太厲害了！</p>
      </div>
    </section>
  </div>
</main>

<!-- 自定義確認對話框 -->
<div id="custom-dialog" class="modal-overlay closed fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" id="dialog-backdrop"></div>
  <div class="modal-card relative bg-white rounded-2xl shadow-xl max-w-md w-full p-6">
    <h3 id="dialog-title" class="text-lg font-extrabold text-gray-900 mb-2">確認</h3>
    <p id="dialog-message" class="text-gray-600 text-sm mb-6">確定要執行此操作嗎？</p>
    <div class="flex justify-end gap-2.5">
      <button id="dialog-cancel" class="px-4 py-2.5 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 text-sm font-medium">取消</button>
      <button id="dialog-confirm" class="px-5 py-2.5 rounded-xl bg-gray-900 hover:bg-gray-800 text-white text-sm font-semibold">確定</button>
    </div>
  </div>
</div>

<!-- 匯入模態框 -->
<div id="import-overlay" class="modal-overlay closed fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeImportModal()"></div>
  <div class="modal-card relative bg-white rounded-2xl shadow-xl max-w-lg w-full p-6 max-h-[90vh] overflow-y-auto">
    <div class="flex items-start justify-between gap-3 mb-5">
      <div>
        <h2 class="text-lg font-extrabold text-gray-900">匯入題目</h2>
        <p class="text-sm text-gray-500 mt-1">貼上 AI 產生的 JSON，確認格式後即可加入題集。</p>
      </div>
      <button id="modal-close-btn" class="p-2 -mr-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-xl transition-colors" title="關閉">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <label class="block text-sm font-semibold text-gray-700 mb-1.5">題集名稱</label>
    <input id="set-name-input" type="text" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300 mb-4" placeholder="例如：學測單字第一回（留白自動命名）">
    <label class="block text-sm font-semibold text-gray-700 mb-1.5">貼上 AI 產生的 JSON</label>
    <textarea id="json-input" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-mono resize-y focus:outline-none focus:ring-2 focus:ring-gray-300" rows="8" placeholder='[{"q": "1. ...", "opts": [...], "ans": 0}]'></textarea>
    <div class="mt-3 rounded-xl bg-gray-50 border border-gray-100 px-3 py-3">
      <p class="text-xs font-semibold text-gray-500 mb-1">匯入前檢查</p>
      <p class="text-xs text-gray-500 leading-relaxed">每題需包含 <span class="font-mono text-gray-700">q</span>、4 個 <span class="font-mono text-gray-700">opts</span>，以及 0 到 3 的 <span class="font-mono text-gray-700">ans</span>。</p>
    </div>
    <p id="import-preview" class="hidden text-sm text-gray-500 mt-2"></p>
    <div id="import-error" class="hidden text-red-600 text-sm mt-2 bg-red-50 rounded-xl px-3 py-2"></div>
    <div class="flex justify-between gap-2.5 mt-5">
      <button id="modal-copy-prompt-btn" class="px-4 py-2.5 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 text-sm font-medium">複製AI指令</button>
      <div class="flex gap-2.5">
        <button onclick="closeImportModal()" class="px-4 py-2.5 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 text-sm font-medium">取消</button>
        <button onclick="importQuestions()" class="px-5 py-2.5 rounded-xl bg-gray-900 hover:bg-gray-800 text-white text-sm font-semibold">套用</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] bg-gray-900 text-white px-4 py-2.5 rounded-xl text-sm font-medium shadow-lg pointer-events-none opacity-0 translate-y-2"></div>

<script src="prompts.js"></script>
<script>
  const STORAGE_KEY = 'vocab_quiz_data';
  const labels = ['(A)', '(B)', '(C)', '(D)'];
  let state = { sets: [], activeSetId: null, score: 0, answered: 0, wrongIndices: new Set() };
  const dom = {};
  
  // 自定義對話框
  let dialogResolve = null;
  function showConfirm(title, message) {
    return new Promise((resolve) => {
      dialogResolve = resolve;
      document.getElementById('dialog-title').textContent = title;
      document.getElementById('dialog-message').textContent = message;
      document.getElementById('custom-dialog').classList.remove('closed');
    });
  }
  function closeDialog(confirmed) {
    document.getElementById('custom-dialog').classList.add('closed');
    if (dialogResolve) { dialogResolve(confirmed); dialogResolve = null; }
  }
  
  function cacheDom() {
    dom.backBtn = document.getElementById('back-to-list-btn');
    dom.scoreDisplay = document.getElementById('score-display');
    dom.score = document.getElementById('score');
    dom.totalCount = document.getElementById('total-count');
    dom.deleteBtn = document.getElementById('delete-set-btn');
    dom.copyPromptBtn = document.getElementById('modal-copy-prompt-btn');
    dom.modalCloseBtn = document.getElementById('modal-close-btn');
    dom.emptyState = document.getElementById('empty-state');
    dom.setsOverview = document.getElementById('sets-overview');
    dom.setsCount = document.getElementById('sets-count');
    dom.questionsCount = document.getElementById('questions-count');
    dom.setsGrid = document.getElementById('sets-grid');
    dom.listView = document.getElementById('list-view');
    dom.quizView = document.getElementById('quiz-view');
    dom.activeSetName = document.getElementById('active-set-name');
    dom.progressMeta = document.getElementById('progress-meta');
    dom.progressPercent = document.getElementById('progress-percent');
    dom.progressBar = document.getElementById('progress-bar');
    dom.quizContainer = document.getElementById('quiz-container');
    dom.completionBanner = document.getElementById('completion-banner');
    dom.finalScore = document.getElementById('final-score');
    dom.finalTotal = document.getElementById('final-total');
    dom.wrongExportArea = document.getElementById('wrong-export-area');
    dom.perfectMsg = document.getElementById('perfect-score-msg');
    dom.importOverlay = document.getElementById('import-overlay');
    dom.setNameInput = document.getElementById('set-name-input');
    dom.jsonInput = document.getElementById('json-input');
    dom.importPreview = document.getElementById('import-preview');
    dom.importError = document.getElementById('import-error');
    dom.toast = document.getElementById('toast');
  }
  
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        if (data.sets && Array.isArray(data.sets) && data.sets.length) {
          state.sets = data.sets;
          state.activeSetId = data.activeSetId || data.sets[0].id;
          return;
        }
      }
    } catch(e) {}
    state.sets = []; state.activeSetId = null;
  }
  function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ sets: state.sets, activeSetId: state.activeSetId })); }
  
  function getActiveSet() { return state.activeSetId ? state.sets.find(s => s.id === state.activeSetId) : null; }
  
  function renderSetList() {
    if (!state.sets.length) {
      dom.emptyState.classList.remove('hidden');
      dom.setsOverview.classList.add('hidden');
      dom.setsGrid.classList.add('hidden');
      return;
    }
    dom.emptyState.classList.add('hidden');
    dom.setsOverview.classList.remove('hidden');
    dom.setsGrid.classList.remove('hidden');
    dom.setsCount.textContent = state.sets.length;
    dom.questionsCount.textContent = state.sets.reduce((sum, set) => sum + set.questions.length, 0);
    dom.setsGrid.innerHTML = '';
    state.sets.forEach(set => {
      const card = document.createElement('div');
      const isActive = set.id === state.activeSetId;
      card.className = `bg-white rounded-2xl shadow-sm border p-4 cursor-pointer hover:shadow-md transition-all ${isActive ? 'border-gray-300 ring-1 ring-gray-200' : 'border-gray-100'}`;
      card.onclick = () => enterQuiz(set.id);
      const topRow = document.createElement('div');
      topRow.className = 'flex items-start justify-between gap-3';
      const title = document.createElement('h3');
      title.className = 'font-bold text-gray-900 text-base mb-1';
      title.textContent = set.name;
      const badge = document.createElement('span');
      badge.className = `inline-flex items-center rounded-full px-2.5 py-1 text-[11px] font-semibold ${isActive ? 'bg-gray-900 text-white' : 'bg-gray-100 text-gray-500'}`;
      badge.textContent = isActive ? '目前題集' : '可開始';
      const count = document.createElement('p');
      count.className = 'text-gray-500 text-sm';
      count.textContent = `${set.questions.length} 題`;
      const hint = document.createElement('p');
      hint.className = 'text-xs text-gray-400 mt-3';
      hint.textContent = '點一下卡片即可開始作答';
      const footer = document.createElement('div');
      footer.className = 'mt-4 flex items-center justify-between gap-3';
      const action = document.createElement('span');
      action.className = 'text-sm font-semibold text-gray-700';
      action.textContent = '開始測驗';
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'text-xs text-red-500 hover:text-red-700 bg-red-50 px-2.5 py-1.5 rounded-lg';
      deleteBtn.textContent = '刪除';
      deleteBtn.onclick = (e) => { e.stopPropagation(); deleteSet(set.id); };
      topRow.appendChild(title);
      topRow.appendChild(badge);
      card.appendChild(topRow);
      card.appendChild(count);
      card.appendChild(hint);
      footer.appendChild(action);
      footer.appendChild(deleteBtn);
      card.appendChild(footer);
      dom.setsGrid.appendChild(card);
    });
  }
  
  async function deleteSet(setId) {
    if (state.sets.length <= 1) {
      const ok = await showConfirm('刪除題集', '這是最後一個題集，刪除後所有資料將清空。確定刪除？');
      if (!ok) return;
      state.sets = [];
      state.activeSetId = null;
    } else {
      const ok = await showConfirm('刪除題集', '刪除這個題集？無法復原。');
      if (!ok) return;
      state.sets = state.sets.filter(s => s.id !== setId);
      if (state.activeSetId === setId) state.activeSetId = state.sets[0].id;
    }
    saveState();
    resetQuiz();
    renderSetList();
    if (state.sets.length === 0) renderSetList(); // 更新空狀態
    else if (dom.quizView.classList.contains('hidden')) renderSetList();
    else exitQuiz();
  }
  
  function resetQuiz() { state.score = 0; state.answered = 0; state.wrongIndices.clear(); dom.completionBanner.classList.add('hidden'); dom.wrongExportArea.classList.add('hidden'); dom.perfectMsg.classList.add('hidden'); }
  function updateScoreDisplay() {
    const set = getActiveSet();
    if (!set) return;
    const total = set.questions.length;
    const percent = total ? Math.round((state.answered / total) * 100) : 0;
    dom.score.textContent = state.score;
    dom.totalCount.textContent = total;
    dom.activeSetName.textContent = set.name;
    dom.progressMeta.textContent = `已作答 ${state.answered} / ${total} 題`;
    dom.progressPercent.textContent = `${percent}%`;
    dom.progressBar.style.width = `${percent}%`;
  }
  
  function renderQuiz() {
    dom.quizContainer.innerHTML = '';
    const set = getActiveSet();
    if (!set) return;
    set.questions.forEach((q, idx) => {
      const card = document.createElement('div'); card.className = 'bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-gray-100';
      const meta = document.createElement('div');
      meta.className = 'flex items-center justify-between gap-3 mb-3';
      const status = document.createElement('span');
      status.className = 'inline-flex items-center rounded-full bg-gray-100 text-gray-600 px-2.5 py-1 text-xs font-semibold';
      status.textContent = `第 ${idx + 1} 題`;
      const metaActions = document.createElement('div');
      metaActions.className = 'flex items-center gap-2';
      const remaining = document.createElement('span');
      remaining.className = 'text-xs text-gray-400';
      remaining.textContent = `${set.questions.length - idx - 1} 題待作答`;
      const copyExplainBtn = document.createElement('button');
      copyExplainBtn.className = 'px-2.5 py-1.5 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 text-xs font-medium transition-colors';
      copyExplainBtn.textContent = '複製解析';
      copyExplainBtn.onclick = () => copyQuestionPrompt(idx);
      meta.appendChild(status);
      metaActions.appendChild(remaining);
      metaActions.appendChild(copyExplainBtn);
      meta.appendChild(metaActions);
      const cleanQ = q.q.replace(/^\d+\.\s*/, '');
      const questionText = document.createElement('p'); questionText.className = 'text-gray-800 text-[15px] md:text-base leading-relaxed mb-4 font-medium';
      questionText.innerHTML = `${idx+1}. ${escapeHtml(cleanQ).replace('_____', '<span class="inline-block border-b-2 border-gray-300 w-16 md:w-20 align-bottom mx-0.5"></span>')}`;
      card.appendChild(meta);
      card.appendChild(questionText);
      const optionsGrid = document.createElement('div'); optionsGrid.className = 'grid grid-cols-1 sm:grid-cols-2 gap-2.5';
      q.opts.forEach((opt, optIdx) => {
        const btn = document.createElement('button'); btn.className = 'option-btn w-full text-left px-4 py-3 rounded-xl border border-gray-200 text-gray-700 font-medium bg-gray-50 hover:bg-gray-100 text-sm md:text-[15px]';
        btn.innerHTML = `<span class="text-gray-400 mr-2 font-semibold">${labels[optIdx]}</span>${escapeHtml(opt)}`;
        btn.onclick = () => handleAnswer(idx, optIdx, btn, optionsGrid, q.ans, q.opts[q.ans]);
        optionsGrid.appendChild(btn);
      });
      card.appendChild(optionsGrid); dom.quizContainer.appendChild(card);
    });
    updateScoreDisplay();
  }
  
  function handleAnswer(qIdx, selIdx, btn, grid, correctIdx, correctWord) {
    if (btn.disabled) return;
    const btns = grid.querySelectorAll('button');
    btns.forEach(b => { b.disabled = true; b.classList.remove('hover:bg-gray-100'); b.classList.add('cursor-default'); });
    if (selIdx === correctIdx) {
      btn.classList.replace('bg-gray-50', 'bg-green-50'); btn.classList.replace('border-gray-200', 'border-green-300'); btn.classList.add('text-green-800');
      state.score++;
    } else {
      btn.classList.replace('bg-gray-50', 'bg-red-50'); btn.classList.replace('border-gray-200', 'border-red-300'); btn.classList.add('text-red-800');
      state.wrongIndices.add(qIdx);
      const correctBtn = btns[correctIdx];
      correctBtn.classList.replace('bg-gray-50', 'bg-green-50'); correctBtn.classList.replace('border-gray-200', 'border-green-300'); correctBtn.classList.add('text-green-800');
    }
    const card = grid.parentElement;
    const qText = card.querySelector('p');
    qText.innerHTML = qText.innerHTML.replace('<span class="inline-block border-b-2 border-gray-300 w-16 md:w-20 align-bottom mx-0.5"></span>', `<span class="text-green-600 font-bold underline decoration-2 underline-offset-4">${escapeHtml(correctWord)}</span>`);
    state.answered++;
    updateScoreDisplay();
    if (state.answered >= (getActiveSet()?.questions.length || 0)) showCompletion();
  }
  
  function showCompletion() {
    const total = getActiveSet().questions.length;
    dom.completionBanner.classList.remove('hidden');
    dom.finalScore.textContent = state.score; dom.finalTotal.textContent = total;
    if (state.wrongIndices.size) { dom.wrongExportArea.classList.remove('hidden'); dom.perfectMsg.classList.add('hidden'); }
    else { dom.wrongExportArea.classList.add('hidden'); dom.perfectMsg.classList.remove('hidden'); }
    dom.completionBanner.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  
  function enterQuiz(setId) {
    state.activeSetId = setId;
    saveState();
    resetQuiz();
    dom.listView.classList.add('hidden');
    dom.quizView.classList.remove('hidden');
    dom.backBtn.classList.remove('hidden');
    dom.scoreDisplay.classList.remove('hidden');
    dom.deleteBtn.classList.remove('hidden');
    renderQuiz();
    renderSetList(); // 保持列表同步
  }
  
  function exitQuiz() {
    dom.listView.classList.remove('hidden');
    dom.quizView.classList.add('hidden');
    dom.backBtn.classList.add('hidden');
    dom.scoreDisplay.classList.add('hidden');
    dom.deleteBtn.classList.add('hidden');
    renderSetList();
  }
  
  function showImportModal() {
    dom.importOverlay.classList.remove('closed');
    dom.setNameInput.value = '';
    dom.jsonInput.value = '';
    dom.importError.classList.add('hidden');
    dom.importPreview.classList.add('hidden');
    dom.copyPromptBtn.classList.remove('hidden');
    setTimeout(() => dom.jsonInput.focus(), 100);
  }
  function closeImportModal() { dom.importOverlay.classList.add('closed'); }
  
  function parseAndValidate(text) {
    let json = text.replace(/^```(?:json)?\s*\n?/i, '').replace(/\n?```\s*$/i, '').trim();
    let data;
    try { data = JSON.parse(json); } catch(e) { return { error: 'JSON 格式錯誤' }; }
    if (!Array.isArray(data)) return { error: '請輸入陣列格式' };
    if (!data.length) return { error: '題目陣列為空' };
    for (let i=0; i<data.length; i++) {
      const q = data[i], n = i+1;
      if (!q.q || typeof q.q !== 'string') return { error: `第 ${n} 題缺少 q` };
      if (!q.q.includes('_____')) return { error: `第 ${n} 題缺少 _____ 標記` };
      if (!Array.isArray(q.opts) || q.opts.length !== 4) return { error: `第 ${n} 題 opts 必須為 4 個選項` };
      if (q.ans === undefined || q.ans < 0 || q.ans > 3) return { error: `第 ${n} 題 ans 需為 0-3` };
    }
    return { valid: true, questions: data };
  }
  
  function importQuestions() {
    const text = dom.jsonInput.value.trim();
    if (!text) { dom.importError.classList.remove('hidden'); dom.importError.textContent = '請貼上 JSON'; return; }
    const res = parseAndValidate(text);
    if (!res.valid) { dom.importError.classList.remove('hidden'); dom.importError.textContent = res.error; return; }
    let name = dom.setNameInput.value.trim();
    if (!name) { const now = new Date(); name = `自訂題集 (${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()})`; }
    const newSet = { id: Date.now().toString(), name, questions: res.questions };
    state.sets.push(newSet);
    state.activeSetId = newSet.id;
    saveState();
    resetQuiz();
    renderSetList();
    closeImportModal();
    showToast(`已匯入「${name}」 (${res.questions.length} 題)`);
    // 如果當前在清單視圖，保持；如果在測驗視圖，可選擇是否進入新題集
    if (!dom.quizView.classList.contains('hidden')) exitQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  
  async function deleteActiveSet() {
    if (state.sets.length <= 1) {
      const ok = await showConfirm('刪除題集', '這是最後一個題集，刪除後所有資料將清空。確定刪除？');
      if (!ok) return;
      state.sets = []; state.activeSetId = null;
    } else {
      const ok = await showConfirm('刪除題集', '刪除這個題集？無法復原。');
      if (!ok) return;
      state.sets = state.sets.filter(s => s.id !== state.activeSetId);
      state.activeSetId = state.sets[0].id;
    }
    saveState();
    resetQuiz();
    if (!dom.quizView.classList.contains('hidden')) exitQuiz();
    else renderSetList();
  }
  
  function copyPrompt() { copyToClipboard(PROMPTS.generateQuiz).then(() => showToast('已複製'), () => showToast('複製失敗')); }
  function copyQuestionPrompt(questionIndex) {
    const set = getActiveSet();
    if (!set) return;
    const q = set.questions[questionIndex];
    if (!q) return;
    const cleanQ = q.q.replace(/^\d+\.\s*/, '');
    const options = q.opts.map((opt, i) => `- ${labels[i]} ${opt}`).join('\n');
    const full = PROMPTS.analyzeQuestion
      .replace('{{QUESTION_NUMBER}}', String(questionIndex + 1))
      .replace('{{QUESTION}}', cleanQ)
      .replace('{{OPTIONS}}', options)
      .replace('{{ANSWER}}', q.opts[q.ans]);
    copyToClipboard(full).then(() => showToast(`第 ${questionIndex + 1} 題解析提示已複製`), () => showToast('複製失敗'));
  }
  function copyWrongAnswers() {
    const set = getActiveSet(); if (!set) return;
    let mistakesText = '';
    let num = 1;
    for (const idx of state.wrongIndices) {
      const q = set.questions[idx];
      const cleanQ = q.q.replace(/^\d+\.\s*/, '');
      mistakesText += `第 ${num} 題：\n${cleanQ}\n${q.opts.map((o,i)=>`${labels[i]} ${o}`).join('  ')}\n正確答案：${q.opts[q.ans]}\n\n`;
      num++;
    }
    const full = PROMPTS.analyzeMistakes.replace('{{MISTAKES}}', mistakesText.trim());
    copyToClipboard(full).then(() => showToast('已複製'), () => showToast('複製失敗'));
  }
  
  function copyToClipboard(text) { return navigator.clipboard?.writeText(text) || Promise.reject(); }
  function showToast(msg) { dom.toast.textContent = msg; dom.toast.classList.remove('opacity-0','translate-y-2','hide'); dom.toast.classList.add('opacity-100','translate-y-0'); setTimeout(() => dom.toast.classList.add('hide'), 2000); }
  function escapeHtml(str) { const div = document.createElement('div'); div.appendChild(document.createTextNode(str)); return div.innerHTML; }
  
  function init() {
    cacheDom(); loadState(); renderSetList();
    dom.jsonInput.addEventListener('input', (e) => {
      const txt = e.target.value.trim();
      if (!txt) {
        dom.importPreview.classList.add('hidden');
        dom.importError.classList.add('hidden');
        return;
      }
      const r = parseAndValidate(txt);
      if (r.valid) {
        dom.importPreview.classList.remove('hidden');
        dom.importPreview.className = 'text-sm text-green-700 mt-2 bg-green-50 rounded-xl px-3 py-2';
        dom.importPreview.textContent = `格式正常，偵測到 ${r.questions.length} 題`;
        dom.importError.classList.add('hidden');
      } else {
        dom.importPreview.classList.add('hidden');
        dom.importError.classList.remove('hidden');
        dom.importError.textContent = r.error;
      }
    });
    document.addEventListener('keydown', e => { if(e.key==='Escape' && !dom.importOverlay.classList.contains('closed')) closeImportModal(); if(e.key==='Escape' && !document.getElementById('custom-dialog').classList.contains('closed')) closeDialog(false); });
    dom.backBtn.onclick = exitQuiz;
    document.getElementById('delete-set-btn').onclick = deleteActiveSet;
    if (dom.copyPromptBtn) dom.copyPromptBtn.onclick = copyPrompt;
    if (dom.modalCloseBtn) dom.modalCloseBtn.onclick = closeImportModal;
    document.getElementById('import-btn').onclick = showImportModal;
    document.getElementById('empty-import-btn').onclick = showImportModal;
    // 移除了 empty-copy-btn
    document.getElementById('copy-wrong-btn').onclick = copyWrongAnswers;
    document.getElementById('dialog-cancel').onclick = () => closeDialog(false);
    document.getElementById('dialog-confirm').onclick = () => closeDialog(true);
    document.getElementById('dialog-backdrop').onclick = () => closeDialog(false);
  }
  init();
</script>
</body>
</html>
